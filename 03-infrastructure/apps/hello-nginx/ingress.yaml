apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nginx-hello
  namespace: hello-nginx

spec:
  ingressClassName: traefik
  rules:
  - host: hello.home.arpa
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: nginx-hello
            port:
              number: 80
