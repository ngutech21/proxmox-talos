apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pgadmin
  namespace: flux-system
spec:
  interval: 30m0s
  releaseName: pgadmin
  targetNamespace: pgadmin
  install:
    createNamespace: false
  chart:
    spec:
      chart: pgadmin4
      version: 1.57.0
      sourceRef:
        kind: HelmRepository
        name: pgadmin4
        namespace: flux-system
  values:
    existingSecret: pgadmin-credentials
    strategy:
      type: Recreate
      rollingUpdate: null
    service:
      type: ClusterIP
      port: 80
    persistentVolume:
      enabled: true
      storageClass: longhorn
      size: 5Gi
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
      - host: pgadmin.home.arpa
        paths:
        - path: /
          pathType: Prefix
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
