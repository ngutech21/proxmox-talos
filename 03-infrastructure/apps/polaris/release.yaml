apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: polaris
  namespace: flux-system
spec:
  interval: 30m0s
  releaseName: polaris
  targetNamespace: polaris
  install:
    createNamespace: false
  chart:
    spec:
      chart: polaris
      version: 5.19.0
      sourceRef:
        kind: HelmRepository
        name: fairwinds-stable
        namespace: flux-system
  values:
    dashboard:
      enable: true
      service:
        type: ClusterIP
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts: []
