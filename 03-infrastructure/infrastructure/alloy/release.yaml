apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: flux-system
spec:
  interval: 30m0s
  releaseName: alloy
  targetNamespace: alloy
  install:
    createNamespace: false
  chart:
    spec:
      chart: alloy
      version: 1.6.0
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  values:
    controller:
      type: deployment
      replicas: 1
    alloy:
      enableReporting: false
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
      configMap:
        content: |
          logging {
            level  = "info"
            format = "logfmt"
          }
    serviceMonitor:
      enabled: false
