apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: flux-system
spec:
  interval: 30m0s
  targetNamespace: kube-system
  chart:
    spec:
      chart: metrics-server
      version: 3.13.0
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
  values:
    replicas: 2
    # Talos kubelet serving certificate rotation is not enabled yet, so
    # metrics-server cannot verify kubelet serving certs out of the box.
    args:
    - --kubelet-insecure-tls
