apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 30m0s
  releaseName: kube-prometheus-stack
  targetNamespace: observability
  install:
    createNamespace: false
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 78.5.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    grafana:
      enabled: false
    kube-state-metrics:
      rbac:
        extraRules:
        - apiGroups:
          - source.toolkit.fluxcd.io
          resources:
          - gitrepositories
          - helmrepositories
          - buckets
          - ocirepositories
          - helmcharts
          verbs:
          - list
          - watch
        - apiGroups:
          - kustomize.toolkit.fluxcd.io
          resources:
          - kustomizations
          verbs:
          - list
          - watch
        - apiGroups:
          - helm.toolkit.fluxcd.io
          resources:
          - helmreleases
          verbs:
          - list
          - watch
      customResourceState:
        enabled: true
        config:
          kind: CustomResourceStateMetrics
          spec:
            resources:
            - groupVersionKind:
                group: source.toolkit.fluxcd.io
                version: v1
                kind: GitRepository
              metricNamePrefix: gotk
              metrics:
              - name: resource_info
                help: The current state of a GitOps Toolkit resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  suspended:
                  - spec
                  - suspend
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
              - name: git_repository_info
                help: The current state of a Flux GitRepository resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  suspended:
                  - spec
                  - suspend
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
            - groupVersionKind:
                group: source.toolkit.fluxcd.io
                version: v1
                kind: HelmRepository
              metricNamePrefix: gotk
              metrics:
              - name: resource_info
                help: The current state of a GitOps Toolkit resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  suspended:
                  - spec
                  - suspend
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
              - name: helm_repository_info
                help: The current state of a Flux HelmRepository resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  suspended:
                  - spec
                  - suspend
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
            - groupVersionKind:
                group: source.toolkit.fluxcd.io
                version: v1
                kind: Bucket
              metricNamePrefix: gotk
              metrics:
              - name: resource_info
                help: The current state of a GitOps Toolkit resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  suspended:
                  - spec
                  - suspend
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
              - name: bucket_info
                help: The current state of a Flux Bucket resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  suspended:
                  - spec
                  - suspend
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
            - groupVersionKind:
                group: source.toolkit.fluxcd.io
                version: v1
                kind: OCIRepository
              metricNamePrefix: gotk
              metrics:
              - name: resource_info
                help: The current state of a GitOps Toolkit resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  suspended:
                  - spec
                  - suspend
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
              - name: oci_repository_info
                help: The current state of a Flux OCIRepository resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  suspended:
                  - spec
                  - suspend
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
            - groupVersionKind:
                group: source.toolkit.fluxcd.io
                version: v1
                kind: HelmChart
              metricNamePrefix: gotk
              metrics:
              - name: resource_info
                help: The current state of a GitOps Toolkit resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
              - name: helm_chart_info
                help: The current state of a Flux HelmChart resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
            - groupVersionKind:
                group: kustomize.toolkit.fluxcd.io
                version: v1
                kind: Kustomization
              metricNamePrefix: gotk
              metrics:
              - name: resource_info
                help: The current state of a GitOps Toolkit resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  suspended:
                  - spec
                  - suspend
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
            - groupVersionKind:
                group: helm.toolkit.fluxcd.io
                version: v2
                kind: HelmRelease
              metricNamePrefix: gotk
              metrics:
              - name: resource_info
                help: The current state of a GitOps Toolkit resource.
                each:
                  type: Info
                  info:
                    labelsFromPath:
                      name:
                      - metadata
                      - name
                labelsFromPath:
                  exported_namespace:
                  - metadata
                  - namespace
                  suspended:
                  - spec
                  - suspend
                  ready:
                  - status
                  - conditions
                  - "[type=Ready]"
                  - status
    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        retention: 120h
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: 5Gi
    prometheus:
      prometheusSpec:
        replicas: 1
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
