apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 30m0s
  releaseName: longhorn
  targetNamespace: longhorn-system
  chart:
    spec:
      chart: longhorn
      version: v1.11.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    createNamespace: false
  values:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: "2"
      defaultDataLocality: best-effort
    longhornUI:
      replicas: 2
    longhornManager:
      resources:
        requests:
          cpu: 200m
          memory: 256Mi
        limits:
          cpu: 1000m
          memory: 512Mi
    defaultSettings:
      defaultDataPath: /var/mnt/longhorn
      defaultDataLocality: best-effort
      defaultReplicaCount: 2
      systemManagedCSIComponentsResourceLimits: >-
        {"csi-attacher":{"requests":{"cpu":"50m","memory":"64Mi"},"limits":{"cpu":"250m","memory":"256Mi"}},"csi-provisioner":{"requests":{"cpu":"50m","memory":"64Mi"},"limits":{"cpu":"250m","memory":"256Mi"}},"csi-resizer":{"requests":{"cpu":"50m","memory":"64Mi"},"limits":{"cpu":"250m","memory":"256Mi"}},"csi-snapshotter":{"requests":{"cpu":"50m","memory":"64Mi"},"limits":{"cpu":"250m","memory":"256Mi"}},"node-driver-registrar":{"requests":{"cpu":"10m","memory":"32Mi"},"limits":{"cpu":"100m","memory":"128Mi"}},"longhorn-liveness-probe":{"requests":{"cpu":"10m","memory":"32Mi"},"limits":{"cpu":"100m","memory":"128Mi"}},"longhorn-csi-plugin":{"requests":{"cpu":"100m","memory":"128Mi"},"limits":{"cpu":"500m","memory":"256Mi"}}}
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: longhorn-driver-deployer
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: longhorn-driver-deployer
              spec:
                template:
                  spec:
                    initContainers:
                      - name: wait-longhorn-manager
                        resources:
                          requests:
                            cpu: 10m
                            memory: 16Mi
                          limits:
                            cpu: 50m
                            memory: 64Mi
                    containers:
                      - name: longhorn-driver-deployer
                        resources:
                          requests:
                            cpu: 100m
                            memory: 128Mi
                          limits:
                            cpu: 250m
                            memory: 256Mi
          - target:
              kind: Deployment
              name: longhorn-ui
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: longhorn-ui
              spec:
                template:
                  spec:
                    containers:
                      - name: longhorn-ui
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 250m
                            memory: 128Mi
