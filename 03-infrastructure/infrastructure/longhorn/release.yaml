apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 30m0s
  releaseName: longhorn
  targetNamespace: longhorn-system
  chart:
    spec:
      chart: longhorn
      version: v1.11.0-hotfix-1
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
  install:
    createNamespace: false
  values:
    longhornUI:
      replicas: 3
    defaultSettings:
      defaultDataPath: /var/mnt/longhorn
      defaultReplicaCount: 3
