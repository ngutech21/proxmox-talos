apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-postgres-smoke
  namespace: flux-system
spec:
  dependsOn:
  - name: infrastructure-cloudnative-pg
  interval: 10m0s
  path: ./03-infrastructure/smoke-tests/postgres
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 10m0s
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-age
