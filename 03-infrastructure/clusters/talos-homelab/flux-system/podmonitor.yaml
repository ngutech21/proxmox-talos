apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: flux-controllers
  namespace: flux-system
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
    - flux-system
  selector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - source-controller
      - kustomize-controller
      - helm-controller
      - notification-controller
  podMetricsEndpoints:
  - port: http-prom
    path: /metrics
    interval: 30s
