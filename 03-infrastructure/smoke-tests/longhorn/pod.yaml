apiVersion: v1
kind: Pod
metadata:
  name: longhorn-smoke
spec:
  restartPolicy: Never
  securityContext:
    fsGroup: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: smoke
    image: busybox:1.36
    resources:
      limits:
        memory: "64Mi"
        cpu: "100m"
      requests:
        memory: "32Mi"
        cpu: "10m"
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
    command:
    - /bin/sh
    - -ec
    - |
      date -Iseconds > /data/created-at.txt
      cat /data/created-at.txt
      sleep 3600
    volumeMounts:
    - name: data
      mountPath: /data

  volumes:
  - name: data
    persistentVolumeClaim:
      claimName: longhorn-smoke
