name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_proxmox_api_token_id: "dummy@pam!talos"
  TF_VAR_proxmox_api_token_secret: "00000000-0000-0000-0000-000000000000"

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Init 01-provision
        working-directory: 01-provision
        run: terraform init -backend=false

      - name: Validate 01-provision
        working-directory: 01-provision
        run: terraform validate

      - name: Init 02-bootstrap
        working-directory: 02-bootstrap
        run: terraform init -backend=false

      - name: Validate 02-bootstrap
        working-directory: 02-bootstrap
        run: terraform validate

  tflint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6.2.1

      - name: Lint 01-provision
        working-directory: 01-provision
        run: tflint --config=.tflint.hcl

      - name: Lint 02-bootstrap
        working-directory: 02-bootstrap
        run: tflint --config=.tflint.hcl

  gitops:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kubeconform
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C "$HOME/.local/bin" kubeconform
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check Flux Kustomization paths
        run: bash scripts/check-flux-kustomization-paths.sh

      - name: Validate GitOps Kustomize renders
        run: bash scripts/validate-gitops-kustomize.sh
